<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Jarvis</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #0a0a0a;
        color: #e0e0e0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 2rem;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 1rem;
        color: #fff;
      }
      #status {
        font-size: 0.9rem;
        margin-bottom: 2rem;
        padding: 0.4rem 1rem;
        border-radius: 999px;
        background: #1a1a1a;
        border: 1px solid #333;
        transition: all 0.3s ease;
      }
      #status.status-ready {
        border-color: #2d7a2d;
        color: #5cb85c;
      }
      #status.status-listening {
        border-color: #d9534f;
        color: #ff6b6b;
        animation: pulse 1.2s ease-in-out infinite;
      }
      #status.status-processing {
        border-color: #f0ad4e;
        color: #f0ad4e;
        animation: pulse 1.5s ease-in-out infinite;
      }
      #status.status-working {
        border-color: #9b59b6;
        color: #bb86fc;
        animation: pulse 1s ease-in-out infinite;
      }
      #status.status-speaking {
        border-color: #5bc0de;
        color: #5bc0de;
        animation: glow 2s ease-in-out infinite;
      }
      #status.status-error {
        border-color: #d9534f;
        color: #d9534f;
      }
      #status.status-disconnected {
        border-color: #d9534f;
        color: #d9534f;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }
      @keyframes glow {
        0%,
        100% {
          box-shadow: 0 0 4px rgba(91, 192, 222, 0.2);
        }
        50% {
          box-shadow: 0 0 12px rgba(91, 192, 222, 0.4);
        }
      }
      #ptt {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 3px solid #444;
        background: #1a1a1a;
        color: #999;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.15s ease;
        user-select: none;
        -webkit-user-select: none;
        touch-action: none;
      }
      #ptt:hover {
        border-color: #666;
      }
      #ptt:active,
      #ptt.active {
        background: #d9534f;
        border-color: #d9534f;
        color: #fff;
        transform: scale(0.95);
      }
      #ptt:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #reconnect {
        display: none;
        margin-top: 1rem;
        padding: 0.5rem 1.5rem;
        border-radius: 6px;
        border: 1px solid #d9534f;
        background: transparent;
        color: #d9534f;
        font-size: 0.85rem;
        cursor: pointer;
        transition: all 0.15s ease;
      }
      #reconnect:hover {
        background: #d9534f;
        color: #fff;
      }
      #transcript {
        margin-top: 2rem;
        max-width: 600px;
        width: 100%;
        max-height: 300px;
        overflow-y: auto;
        padding: 1rem;
        background: #111;
        border-radius: 8px;
        border: 1px solid #222;
        font-size: 0.85rem;
        line-height: 1.5;
      }
      .message {
        margin-bottom: 0.5rem;
        padding: 0.4rem 0;
      }
      .message[data-role='assistant'] {
        color: #5bc0de;
      }
      .message[data-role='user'] {
        color: #999;
        font-style: italic;
      }
      .message[data-role='system'] {
        color: #f0ad4e;
        font-size: 0.8rem;
      }
    </style>
  </head>
  <body>
    <h1>Jarvis</h1>
    <div id="status">Connecting...</div>
    <button id="ptt" disabled>Hold to Talk</button>
    <button id="reconnect">Reconnect</button>
    <div id="transcript"></div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
